spring:
  config:
    import: optional:file:${RCA_ENV_FILE:${user.dir}/.env}[.properties],optional:file:${user.dir}/../.env[.properties],optional:file:${user.home}/IdeaProjects/RCA/.env[.properties]
  application:
    name: rca-ingestion-service
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}
  kafka:
    bootstrap-servers: ${REDPANDA_BROKERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${REDPANDA_USERNAME}"
        password="${REDPANDA_PASSWORD}";

  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
      # Spill large HAR captures to disk instead of holding full file in heap during parse
      file-size-threshold: 2MB

server:
  port: 8081
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 512MB

logging:
  level:
    com.rca: DEBUG
